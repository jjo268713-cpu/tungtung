        body {

            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }
        #main-content {
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
            /* Hidden initially until password verification passes */
            display: none; 
        }
        
        /* Password Screen Box Structure */
        #password-gate {
            max-width: 400px;
            width: 100%;
            background-color: #2a1a08;
            padding: 35px;
            border-radius: 12px;
            border: 2px solid #d47200;
            box-shadow: 0 8px 16px rgba(212, 114, 0, 0.2);
            box-sizing: border-box;
        }
        .pass-input {
            width: 100%;
            padding: 12px;
            background-color: #1a0f00;
            border: 2px solid #d47200;
            color: #fff;
            font-size: 16px;
            border-radius: 8px;
            box-sizing: border-box;
            margin: 15px 0;
            text-align: center;
            outline: none;
        }
        .pass-input:focus {
            border-color: #ff8c00;
        }

        .theme-img {
            max-width: 300px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(212, 114, 0, 0.4);
            margin-bottom: 20px;
        }
        select, button {
            padding: 12px 20px;
            font-size: 16px;
            border-radius: 8px;
            border: 2px solid #d47200;
            background-color: #2a1a08;
            color: #fff;
            margin: 10px;
            outline: none;
        }
        button {
            cursor: pointer;
            background-color: #d47200;
            font-weight: bold;
            transition: 0.3s;
        }
        button:hover {
            background-color: #ff8c00;
        }
        .dashboard-layout {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 500px;
            margin: 0 auto;
        }
        .section-box {
            background-color: #2a1a08;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #d47200;
        }
        label {
            display: block;
            font-size: 18px;
            margin-bottom: 10px;
            color: #ffbc66;
            font-weight: bold;
        }
        select {
            width: 90%;
        }
        .subway-btn {
            background-color: #8a00d4;
            border-color: #b366ff;
            width: 90%;
            font-size: 18px;
            padding: 15px;
        }
        .subway-btn:hover {

    </style>
</head>

    <script>
        // Password validation engine
        function verifyGatePassword() {
            const inputVal = document.getElementById('access-key-field').value;
            const gateDiv = document.getElementById('password-gate');
            const mainContentDiv = document.getElementById('main-content');
            const errorDiv = document.getElementById('auth-error');

            if (inputVal === "worldcup288") {
                gateDiv.style.display = "none";
                mainContentDiv.style.display = "block";
            } else {
                errorDiv.innerText = "Error: Incorrect authentication password.";
                document.getElementById('access-key-field').value = "";
            }
        }

        // Connect enter key submission behavior to input field
        document.getElementById('access-key-field').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                verifyGatePassword();
            }
        });

        // Directly prompts link choices for Subway Surfers option
        function launchSubwaySurfers() {
            const choice = prompt("Type 1 to open Subway Surfers link #1\nType 2 to open Subway Surfers link #2");
            
            if (choice === "1") {
                launchSite("https://ss.randomkzn.com");
            } else if (choice === "2") {
                launchSite("https://ashuni.lol/");
            } else if (choice !== null) {
                alert("Invalid choice. Please enter 1 or 2.");
            }
        }

        // Standard clean canvas window launcher (about:blank isolation layer)
        function launchSite(url) {
            if (!url) return;

            const pWin = window.open('about:blank', '_blank');
            if (!pWin) {
                alert("Pop-up blocked! Please allow pop-ups for this site to view dashboard pages.");
                return;
            }

            const doc = pWin.document;
            doc.title = "Loading Panel...";

            const iframe = doc.createElement('iframe');
            iframe.src = url;
            iframe.style.position = 'fixed';
            iframe.style.top = '0';
            iframe.style.left = '0';
            iframe.style.bottom = '0';
            iframe.style.right = '0';
            iframe.style.width = '100%';
            iframe.style.height = '100%';
            iframe.style.border = 'none';
            iframe.style.margin = '0';
            iframe.style.padding = '0';
            iframe.style.overflow = 'hidden';
            iframe.style.zIndex = '999999';

            doc.body.style.margin = '0';
            doc.body.style.padding = '0';
            doc.body.appendChild(iframe);
        }
    </script>
